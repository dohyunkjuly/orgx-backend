<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowStart" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L0,3 L8,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1060" height="560" fill="#f8fafc"/>
  <rect x="0.5" y="0.5" width="1059" height="559" fill="none" stroke="#e2e8f0"/>

  <!-- title -->
  <text x="530" y="52" text-anchor="middle" font-size="27" font-weight="700" fill="#0f172a">Organization X — System Architecture</text>
  <text x="530" y="80" text-anchor="middle" font-size="14" fill="#64748b">NestJS + Prisma (MySQL) · REST API + real-time WebSocket</text>

  <!-- ===== connectors (under cards) ===== -->
  <!-- client <-> backend -->
  <line x1="290" y1="280" x2="413" y2="280" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <text x="351" y="266" text-anchor="middle" font-size="12.5" font-weight="600" fill="#475569">REST + WebSocket</text>
  <text x="351" y="298" text-anchor="middle" font-size="11" fill="#94a3b8">HTTPS</text>

  <!-- backend -> mysql -->
  <line x1="647" y1="238" x2="768" y2="200" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="708" y="205" text-anchor="middle" font-size="11.5" font-weight="600" fill="#475569">Prisma / SQL</text>

  <!-- backend -> storage -->
  <line x1="647" y1="280" x2="768" y2="322" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="706" y="288" text-anchor="middle" font-size="11.5" font-weight="600" fill="#475569">S3 API</text>

  <!-- backend -> mail -->
  <line x1="647" y1="330" x2="768" y2="442" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="704" y="398" text-anchor="middle" font-size="11.5" font-weight="600" fill="#475569">SMTP</text>

  <!-- ===== Client card ===== -->
  <rect x="60" y="210" width="230" height="140" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="80" y="257" width="46" height="46" rx="11" fill="#2563eb"/>
  <text x="103" y="288" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">UI</text>
  <text x="145" y="252" font-size="11" font-weight="700" letter-spacing="1.5" fill="#2563eb">FRONTEND</text>
  <text x="145" y="281" font-size="19" font-weight="700" fill="#0f172a">Next.js Client</text>
  <text x="145" y="304" font-size="13" fill="#64748b">orgx-frontend</text>

  <!-- ===== Backend card (NestJS) ===== -->
  <rect x="415" y="140" width="232" height="280" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- NestJS logomark: red rounded badge + white N -->
  <rect x="435" y="165" width="46" height="46" rx="12" fill="#e0234e"/>
  <text x="458" y="199" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">N</text>
  <text x="497" y="184" font-size="11" font-weight="700" letter-spacing="1.5" fill="#e0234e">BACKEND</text>
  <text x="497" y="205" font-size="19" font-weight="700" fill="#0f172a">NestJS API</text>
  <line x1="435" y1="234" x2="627" y2="234" stroke="#e2e8f0" stroke-width="1.5"/>

  <circle cx="448" cy="261" r="4" fill="#e0234e"/>
  <text x="464" y="266" font-size="14" fill="#334155">REST API</text>
  <circle cx="448" cy="295" r="4" fill="#e0234e"/>
  <text x="464" y="300" font-size="14" fill="#334155">WebSocket · Socket.IO</text>
  <circle cx="448" cy="329" r="4" fill="#e0234e"/>
  <text x="464" y="334" font-size="14" fill="#334155">JWT + 2FA Auth</text>
  <circle cx="448" cy="363" r="4" fill="#e0234e"/>
  <text x="464" y="368" font-size="14" fill="#334155">Prisma ORM</text>

  <!-- ===== MySQL card ===== -->
  <rect x="770" y="152" width="262" height="96" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="788" y="177" width="46" height="46" rx="11" fill="#0ea5e9"/>
  <text x="811" y="208" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">DB</text>
  <text x="850" y="192" font-size="17" font-weight="700" fill="#0f172a">MySQL</text>
  <text x="850" y="214" font-size="12.5" fill="#64748b">via Prisma</text>

  <!-- ===== Object Storage card ===== -->
  <rect x="770" y="274" width="262" height="96" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="788" y="299" width="46" height="46" rx="11" fill="#f59e0b"/>
  <text x="811" y="330" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">S3</text>
  <text x="850" y="314" font-size="17" font-weight="700" fill="#0f172a">Object Storage</text>
  <text x="850" y="336" font-size="12.5" fill="#64748b">Hetzner S3</text>

  <!-- ===== Mail card ===== -->
  <rect x="770" y="396" width="262" height="96" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="788" y="421" width="46" height="46" rx="11" fill="#8b5cf6"/>
  <text x="811" y="452" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">@</text>
  <text x="850" y="436" font-size="17" font-weight="700" fill="#0f172a">SMTP Mail</text>
  <text x="850" y="458" font-size="12.5" fill="#64748b">verify + reset</text>

  <!-- footer -->
  <text x="530" y="536" text-anchor="middle" font-size="11.5" fill="#94a3b8">Docker · TypeScript · Prisma ORM</text>
</svg>
